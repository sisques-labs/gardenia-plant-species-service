name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build gardenia-plant-species-service
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: sisques-labs/workflows/.github/actions/setup@main
        with:
          node_version: "22"

      - name: Install dependencies
        uses: sisques-labs/workflows/.github/actions/install@main
        with:
          app_path: "."
          frozen_lockfile: "true"

      - name: Lint code
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Build the app
        run: pnpm build

  e2e:
    name: E2E tests (Postgres)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gardenia_plant_species_test
          POSTGRES_USER: gardenia
          POSTGRES_PASSWORD: gardenia
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U gardenia -d gardenia_plant_species_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_DRIVER: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5433
      DATABASE_DATABASE: gardenia_plant_species_test
      DATABASE_USERNAME: gardenia
      DATABASE_PASSWORD: gardenia
      JWT_SECRET: ci-test-jwt-secret
      JWT_EXPIRES_IN: 1d
      OAUTH_TOKEN_ENC_KEY: a2tra2tra2tra2tra2tra2tra2tra2tra2tra2tra2s=
      OAUTH_STATE_SECRET: ci-test-oauth-state-secret-value
      QR_BASE_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Setup
        uses: sisques-labs/workflows/.github/actions/setup@main
        with:
          node_version: "22"

      - name: Install dependencies
        uses: sisques-labs/workflows/.github/actions/install@main
        with:
          app_path: "."
          frozen_lockfile: "true"

      - name: Apply database migrations
        run: pnpm migration:run

      - name: Run E2E tests
        run: pnpm test:e2e

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gardenia_plant_species_test
          POSTGRES_USER: gardenia
          POSTGRES_PASSWORD: gardenia
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U gardenia -d gardenia_plant_species_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_DRIVER: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5433
      DATABASE_DATABASE: gardenia_plant_species_test
      DATABASE_USERNAME: gardenia
      DATABASE_PASSWORD: gardenia
      JWT_SECRET: ci-test-jwt-secret
      JWT_EXPIRES_IN: 1d
      OAUTH_TOKEN_ENC_KEY: a2tra2tra2tra2tra2tra2tra2tra2tra2tra2tra2s=
      OAUTH_STATE_SECRET: ci-test-oauth-state-secret-value
      QR_BASE_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Setup
        uses: sisques-labs/workflows/.github/actions/setup@main
        with:
          node_version: "22"

      - name: Install dependencies
        uses: sisques-labs/workflows/.github/actions/install@main
        with:
          app_path: "."
          frozen_lockfile: "true"

      - name: Apply database migrations
        run: pnpm migration:run

      - name: Run integration tests
        run: pnpm test:integration
